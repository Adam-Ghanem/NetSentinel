name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  core-quality:
    name: Core quality (Python ${{ matrix.python-version }})
    runs-on: ubuntu-latest
    timeout-minutes: 10
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.10", "3.12"]

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip
          cache-dependency-path: |
            requirements.txt
            requirements-dev.txt

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -r requirements.txt -r requirements-dev.txt

      - name: Validate exact dependency pins
        run: python scripts/check_dependency_pins.py

      - name: Lint covered modules, security tooling, migrations, and tests
        run: >-
          python -m ruff check
          app/config.py app/database.py app/enrichment.py app/legacy_adoption.py
          app/parser.py app/schema.py migrations/env.py
          migrations/versions/0001_baseline.py scripts/backup_database.py
          scripts/check_database_health.py scripts/check_dependency_pins.py
          scripts/check_legacy_database.py scripts/check_migration_drift.py
          scripts/check_predeployment.py scripts/check_schema_version.py
          scripts/check_secrets.py scripts/run_migrations.py tests/test_config.py
          tests/test_container_config.py tests/test_database.py
          tests/test_database_backup.py tests/test_dependency_pins.py
          tests/test_legacy_adoption.py tests/test_migration_drift.py
          tests/test_migration_runner.py tests/test_migrations.py tests/test_parser.py
          tests/test_predeployment.py tests/test_schema_version.py
          tests/test_secret_scanner.py

      - name: Run database transaction and health tests
        run: python -m pytest tests/test_database.py

      - name: Verify default database health
        run: python scripts/check_database_health.py --database-url sqlite:///:memory:

      - name: Run database backup tests
        run: python -m pytest tests/test_database_backup.py

      - name: Run schema version tests
        run: python -m pytest tests/test_schema_version.py

      - name: Run migration tests
        run: python -m pytest tests/test_migrations.py

      - name: Run verified migration runner tests
        run: python -m pytest tests/test_migration_runner.py

      - name: Run migration drift tests
        run: python -m pytest tests/test_migration_drift.py

      - name: Run legacy adoption tests
        run: python -m pytest tests/test_legacy_adoption.py

      - name: Run predeployment gate tests
        run: python -m pytest tests/test_predeployment.py

      - name: Verify deployment gate against migrated schema
        env:
          DATABASE_URL: sqlite:///${{ runner.temp }}/predeployment.db
        run: |
          python scripts/run_migrations.py
          python scripts/check_predeployment.py

      - name: Run configuration tests
        run: python -m pytest tests/test_config.py

      - name: Run container configuration tests
        run: python -m pytest tests/test_container_config.py

      - name: Run dependency policy tests
        run: python -m pytest tests/test_dependency_pins.py

      - name: Run parser tests
        run: python -m pytest tests/test_parser.py

      - name: Run secret scanner tests
        run: python -m pytest tests/test_secret_scanner.py

      - name: Scan repository for committed secrets
        run: python scripts/check_secrets.py .

  container-quality:
    name: Container quality
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Validate Compose configuration
        run: docker compose --profile operations config --quiet

      - name: Build hardened runtime image
        run: >-
          docker build
          --build-arg VCS_REF=${{ github.sha }}
          --build-arg BUILD_DATE=ci
          --tag netsentinel:ci
          .

      - name: Verify non-root image user
        run: test "$(docker image inspect netsentinel:ci --format '{{.Config.User}}')" = "netsentinel:netsentinel"

      - name: Verify image healthcheck
        run: test "$(docker image inspect netsentinel:ci --format '{{json .Config.Healthcheck}}')" != "null"

      - name: Run migration job against isolated volume
        env:
          NETSENTINEL_IMAGE_TAG: ci
        run: |
          docker compose --profile operations run --rm --no-build migrate
          docker compose --profile operations run --rm --no-build migrate
