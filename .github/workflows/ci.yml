name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  core-quality:
    name: Core quality (Python ${{ matrix.python-version }})
    runs-on: ubuntu-latest
    timeout-minutes: 10
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.10", "3.12"]

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip
          cache-dependency-path: |
            requirements.txt
            requirements-dev.txt

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -r requirements.txt -r requirements-dev.txt

      - name: Validate exact dependency pins
        run: python scripts/check_dependency_pins.py

      - name: Lint covered modules, security tooling, and tests
        run: >-
          python -m ruff check
          app/config.py
          app/database.py
          app/enrichment.py
          app/parser.py
          scripts/backup_database.py
          scripts/check_dependency_pins.py
          scripts/check_secrets.py
          tests/test_config.py
          tests/test_database.py
          tests/test_database_backup.py
          tests/test_dependency_pins.py
          tests/test_parser.py
          tests/test_secret_scanner.py

      - name: Run database transaction tests
        run: python -m pytest tests/test_database.py

      - name: Run database backup tests
        run: python -m pytest tests/test_database_backup.py

      - name: Run configuration tests
        run: python -m pytest tests/test_config.py

      - name: Run dependency policy tests
        run: python -m pytest tests/test_dependency_pins.py

      - name: Run parser tests
        run: python -m pytest tests/test_parser.py

      - name: Run secret scanner tests
        run: python -m pytest tests/test_secret_scanner.py

      - name: Scan repository for committed secrets
        run: python scripts/check_secrets.py .
