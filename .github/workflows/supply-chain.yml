name: Supply Chain Security

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: supply-chain-${{ github.ref }}
  cancel-in-progress: true

jobs:
  audit-and-sbom:
    name: Dependency audit and SBOM
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: |
            requirements.txt
            requirements-dev.txt

      - name: Install pinned dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -r requirements.txt -r requirements-dev.txt

      - name: Audit installed dependencies
        run: python -m pip_audit --strict

      - name: Generate CycloneDX SBOM
        run: cyclonedx-py environment --output-format JSON --output-file netsentinel-sbom.json

      - name: Upload SBOM
        uses: actions/upload-artifact@v4
        with:
          name: netsentinel-cyclonedx-sbom
          path: netsentinel-sbom.json
          if-no-files-found: error
          retention-days: 30
