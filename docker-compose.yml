services:
  netsentinel:
    build: .
    container_name: netsentinel
    ports:
      - "8501:8501"
    volumes:
      - netsentinel-data:/app/data
    environment:
      - PYTHONUNBUFFERED=1
      - DATABASE_URL=sqlite:////app/data/netsentinel.db
    restart: unless-stopped
    cap_add:
      - NET_ADMIN
      - NET_RAW
    cap_drop:
      - ALL
    security_opt:
      - no-new-privileges:true

volumes:
  netsentinel-data:
