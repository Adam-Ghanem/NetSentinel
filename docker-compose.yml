version: '3.8'

services:
  netsentinel:
    build: .
    container_name: netsentinel
    ports:
      - "8501:8501"
    volumes:
      - .:/app
    environment:
      - PYTHONUNBUFFERED=1
      - DATABASE_URL=sqlite:///netsentinel.db
    restart: unless-stopped
    cap_add:
      - NET_ADMIN
      - NET_RAW
