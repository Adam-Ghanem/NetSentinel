- name: SQL Injection Attempt
  severity: Critical
  description: Potential SQL injection pattern detected in payload metadata.
  payload_pattern: '(?i)(UNION SELECT|INSERT INTO|UPDATE.*?SET|DELETE FROM|OR ''1''=''1''|--|#)'
  mitre_attack: T1190
  recommended_action: Review source host and inspect related web application logs.

- name: Cross-Site Scripting Attempt
  severity: High
  description: Potential cross-site scripting pattern detected in payload metadata.
  payload_pattern: '(?i)(<script>|alert\(|onerror=|onload=|javascript:)'
  mitre_attack: T1189
  recommended_action: Review affected application inputs and inspect related logs.

- name: JNDI Lookup Pattern
  severity: Critical
  description: JNDI lookup pattern detected in payload metadata.
  payload_pattern: '\$\{jndi:(ldap|rmi|dns|nis|iiop|corba|nds|http):'
  mitre_attack: T1190
  recommended_action: Review affected systems and verify patch status.

- name: Suspicious Shell Network Pattern
  severity: Critical
  description: Suspicious shell-related network pattern detected in payload metadata.
  payload_pattern: '(?i)(/dev/tcp|/bin/sh|/bin/bash)'
  mitre_attack: T1059.004
  recommended_action: Investigate the source host and review process activity.

- name: Suspicious Beaconing Pattern
  severity: Critical
  description: Potential command-and-control style traffic pattern detected.
  payload_pattern: '(?i)(metadata|cookie:.*?id=|/pixel.gif|/submit.php\?id=)'
  protocol: TCP
  mitre_attack: T1071.001
  recommended_action: Investigate the involved host and review outbound connections.

- name: Suspicious Staging Pattern
  severity: Critical
  description: Suspicious staging or remote control pattern detected in payload metadata.
  payload_pattern: '(?i)(meterpreter|metsrv|stdapi|RECV|SEND)'
  mitre_attack: T1105
  recommended_action: Investigate the source host and review related alerts.
